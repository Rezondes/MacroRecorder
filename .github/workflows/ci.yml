name: CI

# PR validation only — runs when the PR targets master (no push/tag triggers).
on:
  pull_request:
    branches:
      - master

jobs:
  test:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore MacroRecorderByRezondes.sln

      - name: Test
        run: dotnet test MacroRecorderByRezondes.sln -c Release --no-restore
